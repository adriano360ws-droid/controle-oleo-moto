<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Controle Troca de Óleo Moto</title>
    
    <!-- Conexão com o arquivo de configuração do PWA -->
    <link rel="manifest" href="./manifest.json">
    
    <!-- Configuração dos Ícones para Celular (Android, iPhone e iPad) -->
    <link rel="icon" type="image/png" sizes="192x192" href="./icon-192.png">
    <link rel="icon" type="image/png" sizes="512x512" href="./icon-512.png">
    <link rel="apple-touch-icon" sizes="192x192" href="./icon-192.png">
    <link rel="apple-touch-icon" sizes="512x512" href="./icon-512.png">

    <meta name="theme-color" content="#0F1A3A">
    <meta name="background-color" content="#0F1A3A">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: Arial, sans-serif; }
        html, body { 
            background-color: #0F1A3A !important; 
            color: #fff; 
            padding: 12px; 
            max-width: 480px; 
            margin: 0 auto; 
            min-height: 100vh;
            background: #0F1A3A !important;
        }
        h1 { 
            color: #00FF41; 
            text-align: center; 
            font-size: 2.2rem; 
            margin: 10px 0 15px; 
            text-shadow: 0 0 10px #00FF4180; 
            font-weight: 900;
        }
        .card { 
            background: rgba(20, 40, 80, 0.7); 
            border-radius: 14px; 
            padding: 18px; 
            margin-bottom: 14px; 
            border: 1px solid #00FF4133; 
        }
        .total-odometro { text-align: center; }
        .total-odometro h2 { 
            font-size: 1.3rem; 
            color: #FFFFFF; 
            font-weight: bold; 
            text-shadow: 0 0 5px #FFFFFF80;
            margin-bottom: 8px; 
        }
        .valor-grande { 
            font-size: 3.2rem; 
            font-weight: 900; 
            color: #00FF41; 
            text-shadow: 0 0 12px #00FF4180; 
        }
        .linha { 
            display: flex; 
            justify-content: space-between; 
            padding: 10px 0; 
            border-bottom: 1px solid #ffffff1a; 
            font-size: 1.2rem; 
        }
        .linha:last-child { border: none; padding-bottom: 0; }
        .rotulo { 
            color: #FFFFFF; 
            font-size: 1.2rem; 
            font-weight: 700; 
            text-shadow: 0 0 4px #FFFFFF60;
        }
        .valor { 
            font-weight: bold; 
            color: #00FF41; 
            font-size: 1.25rem; 
        }
        .valor.excedido { 
            color: #ff3333; 
            text-shadow: 0 0 6px #ff333380;
        }
        .barra-fundo { 
            width: 100%; 
            height: 24px; 
            background: #1A2A5A; 
            border-radius: 12px; 
            margin: 15px 0; 
            overflow: hidden; 
        }
        .barra-progresso { 
            height: 100%; 
            width: 0%; 
            background: #00FF41; 
            transition: all 0.5s; 
            box-shadow: 0 0 8px #00FF4180;
        }
        .barra-progresso.amarelo { background: #ffcc00; box-shadow: 0 0 8px #ffcc0080; }
        .barra-progresso.vermelho { background: #ff3333; box-shadow: 0 0 8px #ff333380; }
        .btn-status { 
            width: 100%; 
            padding: 16px; 
            border: none; 
            border-radius: 12px; 
            font-size: 1.4rem; 
            font-weight: 900; 
            margin: 8px 0; 
            cursor: pointer; 
            transition: 0.2s;
        }
        .btn-status.verde { 
            background: #00FF41; 
            color: #0F1A3A; 
            box-shadow: 0 0 15px #00FF4180; 
        }
        .btn-status.amarelo { 
            background: #ffcc00; 
            color: #0F1A3A; 
            box-shadow: 0 0 15px #ffcc0080;
        }
        .btn-status.vermelho { 
            background: #ff3333; 
            color: #fff; 
            box-shadow: 0 0 15px #ff333380; 
        }
        .campo { 
            width: 100%; 
            padding: 14px; 
            border: 2px solid #ff9900; 
            border-radius: 10px; 
            font-size: 1.2rem; 
            margin: 8px 0; 
            background: #f0f0f0; 
            color: #0F1A3A; 
            font-weight: 500;
        }
        .btn { 
            width: 100%; 
            padding: 14px; 
            border: none; 
            border-radius: 10px; 
            font-size: 1.2rem; 
            font-weight: bold; 
            margin: 5px 0; 
            background: #00FF41; 
            color: #0F1A3A; 
            cursor: pointer; 
            transition: 0.2s; 
            box-shadow: 0 0 10px #00FF4160;
        }
        .btn.secundario { 
            background: #254080; 
            color: #fff; 
            box-shadow: none;
        }
        .btn.perigo { 
            background: #ff3333; 
            color: #fff; 
            box-shadow: 0 0 10px #ff333360;
        }
        .historico { margin-top: 15px; }
        .historico h3 { 
            color: #FFFFFF; 
            margin-bottom: 10px; 
            font-size: 1.4rem; 
            font-weight: 900; 
            text-shadow: 0 0 5px #FFFFFF80;
        }
        .item-hist { 
            padding: 10px; 
            border-bottom: 1px solid #ffffff1a; 
            font-size: 1rem; 
            color: #e0e0e0; 
            background: rgba(15, 30, 60, 0.5);
            border-radius: 8px;
            margin-bottom: 6px;
        }
        label {
            color: #FFFFFF;
            font-weight: 700;
            font-size: 1.1rem;
            display: block;
            margin-bottom: 6px;
            text-shadow: 0 0 4px #FFFFFF60;
        }
    </style>
</head>
<body>
    <h1>CONTROLE TROCA DE ÓLEO MOTO</h1>

    <div class="card total-odometro">
        <h2>ODÔMETRO TOTAL</h2>
        <div class="valor-grande" id="totalKm">0,0 km</div>
    </div>

    <div class="card">
        <div class="linha"><span class="rotulo">ÚLTIMA TROCA</span><span class="valor" id="ultimaTroca">0,0 km</span></div>
        <div class="linha"><span class="rotulo">PRÓXIMA TROCA</span><span class="valor" id="proximaTroca">1.300,0 km</span></div>
        <div class="linha"><span class="rotulo">RODADOS DESDE A TROCA</span><span class="valor" id="rodados">0,0 km</span></div>
        <div class="linha"><span class="rotulo">FALTAM PARA TROCAR</span><span class="valor" id="faltam">1.300,0 km</span></div>

        <div class="barra-fundo">
            <div class="barra-progresso" id="barra"></div>
        </div>

        <button class="btn-status verde" id="btnStatus">PODE RODAR TRANQUILO</button>
    </div>

    <div class="card">
        <label>DIGITE KM RODADO HOJE</label>
        <input type="text" class="campo" id="kmHoje" placeholder="Ex: 45,3">
        <button class="btn" onclick="adicionarKm()">ADICIONAR KM</button>

        <label style="margin-top:15px;">DIGITE O ODÔMETRO ATUAL</label>
        <input type="text" class="campo" id="odometroAtual" placeholder="Ex: 4.250,0">
        <button class="btn secundario" onclick="ajustarOdometro()">AJUSTAR ODÔMETRO</button>

        <button class="btn" style="margin-top:15px;" onclick="trocarOleo()">TROQUEI O ÓLEO</button>
        <button class="btn secundario" onclick="limparHistorico()">LIMPAR HISTÓRICO</button>
        <button class="btn perigo" onclick="zerarTudo()">ZERAR TUDO</button>
    </div>

    <div class="card historico" id="cardHistorico">
        <h3>HISTÓRICO</h3>
        <div id="listaHistorico"></div>
    </div>

    <script>
        const INTERVALO = 1300;
        let totalKm = 0;
        let ultimaTroca = 0;
        let historico = [];

        function carregarDados() {
            const dados = JSON.parse(localStorage.getItem('controleOleoMoto')) || {};
            totalKm = dados.totalKm || 0;
            ultimaTroca = dados.ultimaTroca || 0;
            historico = dados.historico || [];
            atualizarTela();
            atualizarHistorico();
        }

        function salvarDados() {
            localStorage.setItem('controleOleoMoto', JSON.stringify({totalKm, ultimaTroca, historico}));
        }

        function formatarKm(valor) {
            return valor.toLocaleString('pt-BR', {minimumFractionDigits: 1, maximumFractionDigits: 1}) + ' km';
        }

        function tocarSom(volume) {
            const ctx = new (window.AudioContext || window.webkitAudioContext)();
            const osc = ctx.createOscillator();
            const gain = ctx.createGain();
            osc.connect(gain);
            gain.connect(ctx.destination);
            osc.frequency.value = 800;
            gain.gain.value = volume;
            osc.start();
            osc.stop(ctx.currentTime + 0.15);
        }

        function atualizarTela() {
            const rodados = Number((totalKm - ultimaTroca).toFixed(1));
            const faltam = Number((ultimaTroca + INTERVALO - totalKm).toFixed(1));
            const proximaTroca = Number((ultimaTroca + INTERVALO).toFixed(1));
            const porcentagem = Math.min((rodados / INTERVALO) * 100, 100);

            document.getElementById('totalKm').textContent = formatarKm(totalKm);
            document.getElementById('ultimaTroca').textContent = formatarKm(ultimaTroca);
            document.getElementById('proximaTroca').textContent = formatarKm(proximaTroca);
            document.getElementById('rodados').textContent = formatarKm(rodados);
            
            const elFaltam = document.getElementById('faltam');
            elFaltam.textContent = formatarKm(Math.abs(faltam)) + (faltam < 0 ? ' (excedido)' : '');
            elFaltam.className = faltam < 0 ? 'valor excedido' : 'valor';

            const barra = document.getElementById('barra');
            const btnStatus = document.getElementById('btnStatus');
            barra.style.width = porcentagem + '%';

            if (faltam > 300) {
                barra.className = 'barra-progresso';
                btnStatus.className = 'btn-status verde';
                btnStatus.textContent = 'PODE RODAR TRANQUILO';
                tocarSom(0.3);
            } else if (faltam <= 300 && faltam > 50) {
                barra.className = 'barra-progresso amarelo';
                btnStatus.className = 'btn-status amarelo';
                btnStatus.textContent = 'ATENÇÃO: AGENDE A TROCA';
                tocarSom(0.6);
            } else {
                barra.className = 'barra-progresso vermelho';
                btnStatus.className = 'btn-status vermelho';
                btnStatus.textContent = 'FAZER TROCA IMEDIATA';
                tocarSom(0.95);
            }
            salvarDados();
        }

        function adicionarKm() {
            const valor = parseFloat(document.getElementById('kmHoje').value.replace(',', '.'));
            if (isNaN(valor) || valor <= 0) { alert('Digite um valor válido!'); return; }
            totalKm = Number((totalKm + valor).toFixed(1));
            historico.unshift({
                data: new Date().toLocaleString('pt-BR'),
                tipo: 'Adição',
                valor: valor,
                total: totalKm
            });
            atualizarTela();
            atualizarHistorico();
            document.getElementById('kmHoje').value = '';
        }

        function ajustarOdometro() {
            const valor = parseFloat(document.getElementById('odometroAtual').value.replace(',', '.'));
            if (isNaN(valor) || valor < totalKm) { alert('Valor deve ser numérico e maior que o atual!'); return; }
            totalKm = Number(valor.toFixed(1));
            historico.unshift({
                data: new Date().toLocaleString('pt-BR'),
                tipo: 'Ajuste',
                valor: valor,
                total: totalKm
            });
            atualizarTela();
            atualizarHistorico();
            document.getElementById('odometroAtual').value = '';
        }

        function trocarOleo() {
            if (!confirm('Confirma que trocou o óleo? Vai reiniciar a contagem!')) return;
            ultimaTroca = Number(totalKm.toFixed(1));
            historico.unshift({
                data: new Date().toLocaleString('pt-BR'),
                tipo: 'Troca de óleo',
                valor: totalKm,
                total: totalKm
            });
            atualizarTela();
            atualizarHistorico();
        }

        function atualizarHistorico() {
            const lista = document.getElementById('listaHistorico');
            lista.innerHTML = '';
            historico.forEach(item => {
                const div = document.createElement('div');
                div.className = 'item-hist';
                div.textContent = `${item.data} — ${item.tipo}: ${formatarKm(item.valor)} | Total: ${formatarKm(item.total)}`;
                lista.appendChild(div);
            });
        }

        function limparHistorico() {
            if (!confirm('Limpar só o histórico? Os dados de km ficam salvos!')) return;
            historico = [];
            atualizarHistorico();
            salvarDados();
        }

        function zerarTudo() {
            if (!confirm('Zerar TODOS os dados? Não terá volta!')) return;
            totalKm = 0;
            ultimaTroca = 0;
            historico = [];
            atualizarTela();
            atualizarHistorico();
        }

        carregarDados();

        // Código do Service Worker integrado diretamente na página para evitar loops e erros no CodePen
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                const CACHE_NOME = 'controle-oleo-moto-v2';
                const ARQUIVOS_CACHE = ['./', './index.html', './manifest.json'];

                navigator.serviceWorker.register('./service-worker.js')
                    .then(reg => console.log('Service Worker registrado!', reg))
                    .catch(err => console.error('Erro no Worker:', err));
            });
        }
    </script>
</body>
</html>
